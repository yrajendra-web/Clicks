name: Daily Clicks Report

on:
  schedule:
    # 1:30 PM IST = 8:00 PM UTC
    - cron: '00 20 * * *'
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pymongo[srv] pandas gspread google-auth python-dotenv numpy certifi
          fi

      - name: Generate Sensitive Files
        shell: bash
        run: |
          # Using cat << 'EOF' prevents shell expansion of secrets
          cat << 'EOF' > credentials.json
          ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          EOF

          cat << 'EOF' > .env
          ${{ secrets.ENV_FILE_CONTENTS }}
          EOF

      - name: Run Clicks Script
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          # Use date with UTC to ensure consistency
          YESTERDAY=$(date -u -d "yesterday" '+%Y-%m-%d')
          echo "🚀 Running report for: $YESTERDAY"
          python clicks.py "$YESTERDAY"

      - name: Cleanup Sensitive Files
        if: always()
        run: |
          rm -f credentials.json
          rm -f .env
